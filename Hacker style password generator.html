<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hacker Password Generator</title>

<style>
body{
background:black;
color:#00ff00;
font-family:Courier New, monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
border:2px solid #00ff00;
padding:30px;
width:350px;
box-shadow:0 0 20px #00ff00;
}

h1{
margin-bottom:20px;
}

input{
width:90%;
padding:10px;
background:black;
color:#00ff00;
border:1px solid #00ff00;
font-size:16px;
text-align:center;
}

button{
margin-top:15px;
padding:10px 20px;
background:black;
color:#00ff00;
border:1px solid #00ff00;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#00ff00;
color:black;
}

</style>

</head>

<body>

<div class="container">

<h1>Password Generator</h1>

<input type="text" id="password" placeholder="Click Generate" readonly>

<br>

<button onclick="generatePassword()">Generate</button>

</div>

<script>

function generatePassword(){

let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
let password = "";

for(let i=0;i<12;i++){
password += chars.charAt(Math.floor(Math.random()*chars.length));
}

document.getElementById("password").value = password;

}

</script>

</body>

</html>
